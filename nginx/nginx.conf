upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 5M;

    # ------------------------------------------------------------------
    # Gzip compression — reduces payload size for text-based responses
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json;

    # ------------------------------------------------------------------
    # Static files — collected via `python manage.py collectstatic`
    # Served directly by Nginx, bypassing Gunicorn for performance
    # ------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Media files — user-uploaded content (avatars, request photos)
    # ------------------------------------------------------------------
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ------------------------------------------------------------------
    # All other requests → Django/Gunicorn upstream
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
