{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Реєстрація — MicroVolunteer{% endblock %}

{% block content %}
<div class="auth-shell" style="padding:48px 0">
  <div class="auth-card wide" style="width:100%;max-width:560px">
    <div style="text-align:center;margin-bottom:24px">
      <span class="logo-mark" style="width:48px;height:48px;font-size:22px;margin:0 auto 12px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;background:linear-gradient(135deg,var(--mv-blue-600),var(--mv-blue-800));color:#fff">
        <i class="bi bi-heart-pulse-fill"></i>
      </span>
    </div>
    <h2 class="auth-title">Створити акаунт</h2>
    <p class="auth-sub">Приєднуйтесь до спільноти волонтерів за хвилину</p>

    <form method="post" novalidate autocomplete="on">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-solid btn-block btn-lg" style="margin-top:8px">
        <i class="bi bi-check-circle"></i> Зареєструватися
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--mv-gray-500)">
      Вже маєте акаунт? <a href="{% url 'accounts:login' %}">Увійти</a>
    </p>
  </div>
</div>
{% endblock %}
