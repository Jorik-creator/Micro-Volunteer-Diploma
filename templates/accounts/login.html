{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Вхід — MicroVolunteer{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card" style="width:100%;max-width:440px">
    <div style="text-align:center;margin-bottom:24px">
      <span class="logo-mark" style="width:48px;height:48px;font-size:22px;margin:0 auto 12px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;background:linear-gradient(135deg,var(--mv-blue-600),var(--mv-blue-800));color:#fff">
        <i class="bi bi-heart-pulse-fill"></i>
      </span>
    </div>
    <h2 class="auth-title">З поверненням!</h2>
    <p class="auth-sub">Увійдіть, щоб продовжити допомагати</p>

    <form method="post" novalidate autocomplete="on">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-solid btn-block btn-lg" style="margin-top:8px">
        <i class="bi bi-door-open"></i> Увійти
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--mv-gray-500)">
      Немає акаунту? <a href="{% url 'accounts:register' %}">Зареєструватися</a>
    </p>
  </div>
</div>
{% endblock %}
