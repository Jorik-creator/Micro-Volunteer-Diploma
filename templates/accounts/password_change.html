{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Змінити пароль — MicroVolunteer{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card" style="width:100%;max-width:440px">
    <h2 class="auth-title">Змінити пароль</h2>
    <p class="auth-sub">Введіть поточний та новий пароль</p>

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-solid btn-block btn-lg" style="margin-top:8px">
        <i class="bi bi-key"></i> Змінити пароль
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--mv-gray-500)">
      <a href="{% url 'accounts:profile' %}"><i class="bi bi-arrow-left"></i> До профілю</a>
    </p>
  </div>
</div>
{% endblock %}
