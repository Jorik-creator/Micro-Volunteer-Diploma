{% extends "base.html" %}

{% block title %}Карта запитів — MicroVolunteer{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  #map { height: 550px; width: 100%; border-radius: 8px; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3 px-2">
    <h2><i class="bi bi-map me-2"></i>Карта запитів</h2>
    <a href="{% url 'requests:list' %}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-list-ul me-1"></i>Список
    </a>
  </div>

  <div id="map"></div>

  <div class="mt-3 px-2">
    <small class="text-muted">
      <span class="badge bg-danger me-1">●</span> Критична
      <span class="badge bg-warning text-dark ms-2 me-1">●</span> Висока
      <span class="badge bg-info text-dark ms-2 me-1">●</span> Середня
      <span class="badge bg-success ms-2 me-1">●</span> Низька
    </small>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  const map = L.map('map').setView([50.4501, 30.5234], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  const urgencyColors = {
    critical: '#dc3545',
    high:     '#ffc107',
    medium:   '#0dcaf0',
    low:      '#198754',
  };

  function makeIcon(urgency) {
    const color = urgencyColors[urgency] || '#6c757d';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
      <path fill="${color}" stroke="#fff" stroke-width="1.5"
        d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"/>
      <circle fill="#fff" cx="12" cy="12" r="5"/>
    </svg>`;
    return L.divIcon({
      html: svg,
      iconSize: [24, 36],
      iconAnchor: [12, 36],
      popupAnchor: [0, -36],
      className: '',
    });
  }

  fetch('{% url "requests:map-data" %}')
    .then(r => r.json())
    .then(data => {
      data.forEach(item => {
        L.marker([item.lat, item.lon], { icon: makeIcon(item.urgency) })
          .addTo(map)
          .bindPopup(`
            <strong>${item.title}</strong><br>
            <span class="text-muted">${item.category}</span><br>
            📅 ${item.needed_date}<br>
            ⏱ ${item.duration}<br>
            <a href="${item.url}" class="btn btn-sm btn-primary mt-1">Деталі</a>
          `);
      });
    })
    .catch(() => {
      console.error('Failed to load map data');
    });
})();
</script>
{% endblock %}
