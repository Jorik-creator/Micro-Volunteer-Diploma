{% extends "base.html" %}

{% block title %}Карта запитів — MicroVolunteer{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  #map { height: calc(100vh - 72px); width: 100%; }
  body.map-page main { overflow: hidden; }
</style>
{% endblock %}

{% block content %}
<div style="position:relative">
  <!-- Toolbar overlay -->
  <div style="position:absolute;top:16px;left:16px;z-index:400;display:flex;gap:8px;align-items:center">
    <div style="background:#fff;border-radius:12px;padding:8px 16px;box-shadow:var(--mv-shadow-card);display:flex;align-items:center;gap:12px">
      <strong style="font-size:15px;color:var(--mv-blue-900)"><i class="bi bi-map" style="margin-right:6px"></i>Карта запитів</strong>
      <a href="{% url 'requests:list' %}" class="btn btn-muted btn-sm">
        <i class="bi bi-list-ul"></i> Список
      </a>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Legend overlay -->
  <div class="map-legend">
    <span class="map-legend-item"><span class="urgency-dot critical"></span> Критична</span>
    <span class="map-legend-item"><span class="urgency-dot high"></span> Висока</span>
    <span class="map-legend-item"><span class="urgency-dot medium"></span> Середня</span>
    <span class="map-legend-item"><span class="urgency-dot low"></span> Низька</span>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (!window.L) {
  document.getElementById('map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mv-gray-500)"><div style="text-align:center"><i class="bi bi-map" style="font-size:48px;display:block;margin-bottom:16px"></i><p>Карта недоступна. Перевірте з\'єднання з інтернетом.</p></div></div>';
} else {
(function () {
  const map = L.map('map').setView([50.4501, 30.5234], 10);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20,
  }).addTo(map);

  const urgencyColors = {
    critical: '#dc3545',
    high:     '#ffc107',
    medium:   '#0dcaf0',
    low:      '#198754',
  };

  function makeIcon(urgency) {
    const color = urgencyColors[urgency] || '#6c757d';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
      <path fill="${color}" stroke="#fff" stroke-width="1.5"
        d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"/>
      <circle fill="#fff" cx="12" cy="12" r="5"/>
    </svg>`;
    return L.divIcon({
      html: svg,
      iconSize: [24, 36],
      iconAnchor: [12, 36],
      popupAnchor: [0, -36],
      className: '',
    });
  }

  fetch('{% url "requests:map-data" %}')
    .then(r => r.json())
    .then(data => {
      data.forEach(item => {
        L.marker([item.lat, item.lon], { icon: makeIcon(item.urgency) })
          .addTo(map)
          .bindPopup(`
            <strong>${item.title}</strong><br>
            <span class="text-muted">${item.category}</span><br>
            📅 ${item.needed_date}<br>
            ⏱ ${item.duration}<br>
            <a href="${item.url}" class="btn btn-sm btn-primary mt-1">Деталі</a>
          `);
      });
    })
    .catch(() => {
      console.error('Failed to load map data');
    });
})();
}
</script>
{% endblock %}
